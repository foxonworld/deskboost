<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeskBoost - Green plants for busy workspaces</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#4CAF50",
              "primary-dark": "#43A047",
              "background-light": "#f6f8f6",
              "background-dark": "#102216",
              "text-main": "#111813",
              "text-secondary": "#61896f",
              "surface-light": "#ffffff",
              "surface-dark": "#1a2c20",
            },
            fontFamily: {
              display: ["Manrope", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "0.75rem",
              xl: "1rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      @keyframes scan-once {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-scan-once {
        animation: scan-once 2.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      @keyframes cta-pulse-once {
        0% { transform: scale(1); }
        50% { transform: scale(1.04); box-shadow: 0 0 12px rgba(76, 175, 80, 0.3); }
        100% { transform: scale(1); }
      }
      .animate-cta-pulse-once {
        animation: cta-pulse-once 1.2s cubic-bezier(0.25, 1, 0.5, 1) 1;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-text-main font-display antialiased"
  >
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
